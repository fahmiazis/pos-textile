services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-textile-app
    restart: unless-stopped
    ports:
      - "6060:6060"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - storage_data:/var/www/html/storage/app/public
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

volumes:
  storage_data:
    driver: local

networks:
  app-network:
    driver: bridge